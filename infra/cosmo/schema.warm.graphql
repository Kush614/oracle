extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.3"
    import: ["@key", "@external"]
  )

type Market @key(fields: "id") {
  id: ID! @external
  resolution: Resolution
  challenges: [Challenge!]!
  citedMd: CitedMd
}

type Resolution {
  cycle: Int!
  outcome: String!
  confidence: Float!
  narrative: String!
  resolverAgent: String!
  resolverDigest: String!
  resolvedAt: String!
  sbomRef: String!
}

type Challenge {
  cycle: Int!
  challengerAgent: String!
  counterSourcesFound: Int!
  maxContradictionConfidence: Float!
  threshold: Float!
  result: String!
  ranAt: String!
}

type CitedMd {
  hash: String!
  url: String!
  publishedAt: String!
  markdown: String!
}

type AgentScore {
  agent: String!
  runs: Int!
  verdictAccuracy: Float!
  citationCoverage: Float!
  confidenceCalibration: Float!
  resolutionLatencyMs: Float!
  challengeSuccessRate: Float
}

type AgentRun {
  runId: String!
  agent: String!
  marketId: String!
  startedAt: String!
  endedAt: String!
  outcome: String!
  confidence: Float
}

type Query {
  resolution(marketId: ID!): Resolution
  resolutions: [Resolution!]!
  agentScores: [AgentScore!]!
  agentRuns(marketId: ID): [AgentRun!]!
}
